<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Khushi ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
 
<body>
 
<h1>🎉 Happy Birthday Khushi ❤️</h1>
 
<!-- Cake Section -->
<div id="cakeSection">
 
    <div id="cakeContainer">
        <div id="cakeSplitContainer">
            <div id="cakeLeft">🎂</div>
            <div id="cakeRight">🎂</div>
        </div>
 
        <div id="cakeName">Khushi</div>
 
        <div id="candles">🕯️🕯️🕯️</div>
        <canvas id="cutCanvas"></canvas>
    </div>
 
    <button onclick="startMic()">Blow Candles 🎤</button>
    <p id="micStatus"></p>
 
    <p id="cakeMessage"></p>
</div>
 
<!-- Slideshow -->
<div id="slideshow" style="display:none;">
    <img id="slide" src="photo1.jpg">
</div>
 
<!-- Proposal -->
<div id="proposal" style="display:none;">
    <h2>Khushi ❤️</h2>
    <h1>Will You Marry Me? 💍</h1>
    <button onclick="yes()">Yes ❤️</button>
    <button onclick="no()">No 😜</button>
</div>
 
<audio id="music" src="song.mp3"></audio>
 
<script src="script.js"></script>
</body>
</html>
