<body class="page4">

<div class="letter">
  <p id="text"></p>
</div>

<audio id="music" loop>
  <source src="assets/music/page4.mp3">
</audio>

<script src="js/main.js"></script>

<script>
let msg = "Happy Birthday ❤️<br><br>You are my world 💕<br>I love you forever...";
let i = 0;

function type() {
  if(i < msg.length){
    document.getElementById("text").innerHTML += msg.charAt(i);
    i++;
    setTimeout(type, 40);
  }
}
type();

window.onload = () => document.body.classList.add("loaded");
createHearts();
</script>
